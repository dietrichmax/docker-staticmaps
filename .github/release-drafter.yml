name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"

exclude-labels:
  - skip-changelog

version-resolver:
  major:
    labels: ["breaking-change", "breaking", "major"]
  minor:
    labels: ["feature", "enhancement"]
  patch:
    labels: ["fix", "bug", "maintenance", "refactor", "documentation", "dependencies"]
  default: patch

# Deterministic, title-based labeling (conventional commits).
# Each PR lands in exactly one changelog category regardless of file-path
# labels applied by labeler.yml. `(deps)` scopes are excluded from fix/
# maintenance so dependency bumps only appear under Dependencies, and the
# `!` breaking marker is excluded from type rules so breaking commits only
# appear under Breaking changes.
autolabeler:
  - label: skip-changelog
    title: ['/^chore\(release\):/i']
  - label: breaking-change
    title: ['/^\w+(\(.+\))?!:/i']
  - label: dependencies
    title: ['/^(chore|fix|build)\(deps[\w-]*\)/i']
  - label: feature
    title: ['/^feat(\(.+\))?:/i']
  - label: fix
    title: ['/^fix(\((?!deps)[^)]*\))?:/i']
  - label: documentation
    title: ['/^docs(\(.+\))?:/i']
  - label: maintenance
    title: ['/^(chore|refactor|perf|style|ci|build|test)(\((?!deps)[^)]*\))?:/i']

categories:
  - title: "Breaking changes"
    labels: ["breaking-change", "breaking", "major"]
  - title: "Features"
    labels: ["feature", "enhancement"]
  - title: "Bug fixes"
    labels: ["fix", "bugfix", "bug", "patch"]
  - title: "Documentation"
    labels: ["documentation"]
  - title: "Maintenance"
    labels: ["maintenance", "refactor"]
  - title: "Dependencies"
    labels: ["dependencies"]
    collapse-after: 3

change-template: "- $TITLE (#$NUMBER) by @$AUTHOR"
change-title-escapes: '\<*_&'
category-template: "## $TITLE"

template: |
  ## What's Changed

  $CHANGES

  ## Docker image

  ```
  docker pull mxdcodes/docker-staticmaps:v$RESOLVED_VERSION
  ```

  **Full Changelog**: https://github.com/dietrichmax/docker-staticmaps/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION
