name: "Auto-label CI/CD Changes"

on:
  pull_request_target:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write


jobs:
  label-ci:
    runs-on: ubuntu-latest
    if: github.event.pull_request.base.repo.full_name == 'dietrichmax/docker-staticmaps'
    steps:
      - name: Apply Labels
        uses: actions/labeler@bf12e9b00b37c5c0ca2b87b79b2daf7891dbda13 # v7
        with:
          configuration-path: .github/labeler.yml
          sync-labels: false
          dot: false
