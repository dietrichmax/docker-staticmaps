name: Docker Build

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/docker-build.yml'
      - 'docker/**'
      - 'public/**'
      - 'src/**'
      - 'package*.json'
  release:
    types:
      - published

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "26"
          cache: "npm"
      - run: npm ci
      - run: npm test

  build_scan_push:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      packages: write
      contents: read
      attestations: write
      id-token: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      # Build the image locally (amd64) so it can be scanned before publishing
      - name: Build image for scanning
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: ./docker/Dockerfile
          platforms: linux/amd64
          load: true
          tags: docker-staticmaps:scan

      # Gate: fail the run on fixable HIGH/CRITICAL vulnerabilities, before any push
      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: docker-staticmaps:scan
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true
          format: table

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image with branch/commit tags (push events)
        if: github.event_name == 'push'
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: ./docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/docker-staticmaps:${{ github.sha }}
            ${{ secrets.DOCKER_HUB_USERNAME }}/docker-staticmaps:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/docker-staticmaps:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}

      - name: Build and push image with release tag (release events only)
        if: github.event_name == 'release'
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: ./docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/docker-staticmaps:${{ github.event.release.tag_name }}
            ghcr.io/${{ github.repository }}:${{ github.event.release.tag_name }}
