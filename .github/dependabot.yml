version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    labels: ["chore"]
    commit-message:
      prefix: "chore(deps)"
    groups:
      minor-and-patch:
        update-types: [minor, patch]

  - package-ecosystem: npm
    directory: /docs
    schedule:
      interval: weekly
    labels: ["chore"]
    commit-message:
      prefix: "chore(deps)"
    groups:
      minor-and-patch:
        update-types: [minor, patch]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels: ["chore"]
    commit-message:
      prefix: "chore(deps)"
